<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrer bruker - Grønn logistikk AS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="signup.css" />
  </head>
  <body>
    <div class="topcontainer">
      <div class="overskrift">
        <h1>GRØNN LOGISTIKK AS</h1>
      </div>
    </div>

    <main class="signup-page">
      <section class="signup-panel">
        <h2>Registrer bruker</h2>
        <p>
          Opprett en konto med e-post og passord for å få tilgang til
          kundesiden.
        </p>
        <p>
          Har du allerede en konto? <a href="loginnside.html">Logg inn her</a>.
        </p>
        <form id="signup-form" class="signup-form">
          <div class="form-group">
            <label for="email">E-post</label>
            <input
              id="email"
              type="email"
              class="form-control"
              placeholder="din@email.no"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Passord</label>
            <input
              id="password"
              type="password"
              class="form-control"
              placeholder="Passord"
              required
            />
          </div>
          <div class="form-group">
            <label for="confirm-password">Bekreft passord</label>
            <input
              id="confirm-password"
              type="password"
              class="form-control"
              placeholder="Bekreft passord"
              required
            />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-success">Registrer</button>
          </div>
          <div id="signup-message" class="signup-message"></div>
        </form>
      </section>
    </main>

    <div class="bottomcontainer">
      <footer>
        <p>© 2026 Grønn logistikk AS, ingen rettigheter reservert.</p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
    <script src="signup.js"></script>
  </body>
</html>
